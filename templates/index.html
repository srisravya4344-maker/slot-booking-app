<!DOCTYPE html>
<html>
<head>
    <title>Slot Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Slot Booking Web Application</h2>

<a href="/bookings" class="btn btn-dark mb-3">View All Bookings</a>

<div class="row">

{% for slot in slots %}

<div class="col-md-3 mb-3">

<div class="card">

<div class="card-body text-center">

<h5>{{slot}}</h5>

<a href="/book/{{slot}}" class="btn btn-primary">Book</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
