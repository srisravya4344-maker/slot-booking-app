<!DOCTYPE html>
<html>

<head>

<title>Bookings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Booked Slots</h2>

<a href="/" class="btn btn-primary mb-3">Home</a>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Slot</th>

<th>Booked On</th>

</tr>

</thead>

<tbody>

{% for b in bookings %}

<tr>

<td>{{b.id}}</td>

<td>{{b.name}}</td>

<td>{{b.email}}</td>

<td>{{b.phone}}</td>

<td>{{b.slot_time}}</td>

<td>{{b.booking_date}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
